version: "3.9"

services:
  db:
    image: mysql:8.4
    container_name: htlkrems-predict-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DB:-htlkrems_predict}
      MYSQL_USER: ${MYSQL_USER:-htlkrems}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-htlkrems123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root12345}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    # --- ADDED HEALTHCHECK ---
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-htlkrems}", "-p${MYSQL_PASSWORD:-htlkrems123}"]
      timeout: 5s
      retries: 10
      interval: 3s

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: htlkrems-predict-backend
    restart: unless-stopped
    # --- UPDATED DEPENDS_ON ---
    depends_on:
      db:
        condition: service_healthy
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-htlkrems-predict}
      API_V1_STR: ${API_V1_STR:-/api/v1}
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-htlkrems}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-htlkrems123}
      MYSQL_DB: ${MYSQL_DB:-htlkrems_predict}
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  db_data: