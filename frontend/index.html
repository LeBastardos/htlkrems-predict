<!-- Login Modal Logik -->
    <div class="auth-modal" id="loginModal">
        <form class="auth-modal-content auth-animate" action="/action_page.php" method="post">
            <div class="auth-modal-header">
                <h2>Login</h2>
                <button type="button" class="auth-close" data-close-modal="loginModal" title="Close Modal">&times;</button>
            </div>

            <label for="loginUsername"><b>Username</b></label>
            <input type="text" id="loginUsername" placeholder="Enter Username" name="uname" required>

            <label for="loginPassword"><b>Password</b></label>
            <input type="password" id="loginPassword" placeholder="Enter Password" name="psw" required>

            <button type="submit" class="auth-submit">Login</button>

            <label class="auth-checkbox">
                <input type="checkbox" checked="checked" name="remember"> Remember me
            </label>

            <div class="auth-modal-footer">
                <button type="button" class="auth-cancel" data-close-modal="loginModal">Cancel</button>
                <span>Forgot <a href="#">password?</a></span>
            </div>
        </form>
    </div>
<!--////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////-->

<!-- Signup Modal Logik -->
    <div class="auth-modal" id="signupModal">
        <form class="auth-modal-content auth-animate" action="/action_page.php" method="post">
            <div class="auth-modal-header">
                <h2>Sign Up</h2>
                <button type="button" class="auth-close" data-close-modal="signupModal" title="Close Modal">&times;</button>
            </div>

            <label for="signupEmail"><b>Email</b></label>
            <input type="text" id="signupEmail" placeholder="Enter Email" name="email" required>

            <label for="signupPassword"><b>Password</b></label>
            <input type="password" id="signupPassword" placeholder="Enter Password" name="psw" required>

            <label for="signupPasswordRepeat"><b>Repeat Password</b></label>
            <input type="password" id="signupPasswordRepeat" placeholder="Repeat Password" name="psw-repeat" required>

            <label class="auth-checkbox">
                <input type="checkbox" checked="checked" name="remember"> Remember me
            </label>

            <p>By creating an account you agree to our <a href="#">Terms & Privacy</a>.</p>

            <div class="auth-actions">
                <button type="button" class="auth-cancel" data-close-modal="signupModal">Cancel</button>
                <button type="submit" class="auth-submit">Sign Up</button>
            </div>
        </form>
    </div>
