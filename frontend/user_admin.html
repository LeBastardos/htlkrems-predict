<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTLkrems Predict · User Management</title>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <button type="button" class="btn btn-outline-light" id="ChangeModeButton">
                Dark Mode
            </button>

            <div class="navbar-search">
                <form>
                    <label for="search">Search:</label>
                    <input type="text" class="form-control" id="search" placeholder="Search markets">
                </form>
            </div>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#live-markets">Aktuell</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html">Profil</a></li>
                    <li class="nav-item"><a class="nav-link d-none" id="adminLink" href="admin.html">Admin</a></li>
                </ul>
            </div>

            <div class="auth-area">
                <div class="auth-buttons">
                    <span class="navbar-text text-light" id="authUserName"></span>
                    <a class="btn btn-outline-light d-none" id="profileLink" href="profile.html">Profile</a>
                    <button type="button" class="btn btn-outline-light d-none" id="logoutButton">Logout</button>
                    <button type="button" class="btn btn-primary" id="openLoginModal">Login</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="page-content" id="userAdminPage">
        <header class="page-header">
            <div>
                <h1>User Management</h1>
                <p>List of users and quick role edits.</p>
            </div>
            <span class="backend-badge" id="userAdminStatus">Loading...</span>
        </header>

        <section class="market-card">
            <h2>Users</h2>
            <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;">
                <input id="userSearch" class="form-control form-control-sm" placeholder="Search users by name or email">
                <button id="userSearchBtn" class="btn btn-sm btn-outline-primary">Search</button>
            </div>
            <ul id="userList">
                <li>Loading users...</li>
            </ul>
        </section>

        <p class="form-status" id="userAdminFormStatus"></p>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
